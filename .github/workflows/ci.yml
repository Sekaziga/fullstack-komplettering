name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: startkod/api/node_modules
          key: ${{ runner.os }}-api-node-${{ hashFiles('startkod/api/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-api-node-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: startkod/frontend/node_modules
          key: ${{ runner.os }}-frontend-node-${{ hashFiles('startkod/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-node-

      - name: Clean backend node_modules and npm cache
        working-directory: startkod/api
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force

      - name: Install backend dependencies
        working-directory: startkod/api
        run: npm install

      - name: Clean frontend node_modules and npm cache
        working-directory: startkod/frontend
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force

      - name: Install frontend dependencies
        working-directory: startkod/frontend
        run: npm install

      - name: Test backend
        working-directory: startkod/api
        run: npm test

      - name: Test frontend
        working-directory: startkod/frontend
        run: npm test

      - name: Build backend
        working-directory: startkod/api
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then npm run build; else echo "No build script"; fi

      - name: Build frontend
        working-directory: startkod/frontend

        run: npm run build
  
      - name: Deploy (placeholder)
        if: ${{ success() }}
        run: echo "Deploying..."

  codeql-analysis:
    name: Analyze (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
